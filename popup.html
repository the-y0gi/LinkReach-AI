<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkReach AI</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --primary: #0a66c2;
        --primary-hover: #004182;
        --success: #057642;
        --bg-gradient: linear-gradient(180deg, #ffffff 0%, #f3f2f0 100%);
        --text-main: #1d1d1d;
        --text-sub: #666666;
        --border: #dce6f1;
        --input-bg: #f8fafc;
      }

      body {
        width: 400px;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        background: var(--bg-gradient);
        color: var(--text-main);
      }

      .container {
        padding: 28px 24px;
      }

      /* Header Styling */
      .header {
        text-align: center;
        margin-bottom: 28px;
      }

      .header .logo-wrapper {
        background: #eef3f8;
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
      }

      .header h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .header p {
        font-size: 13px;
        color: var(--text-sub);
        margin: 6px 0 0;
        font-weight: 400;
      }

      /* Input Styling */
      .input-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 13px;
        color: #475569;
      }

      input[type="password"],
      textarea {
        width: 100%;
        padding: 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        box-sizing: border-box;
        background: var(--input-bg);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        color: var(--text-main);
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(10, 102, 194, 0.1);
      }

      textarea {
        resize: none;
        min-height: 110px;
        line-height: 1.6;
      }

      /* Primary Action Button */
      .btn-primary {
        width: 100%;
        padding: 15px;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(10, 102, 194, 0.25);
        margin-top: 8px;
      }

      .btn-primary:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(10, 102, 194, 0.35);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      /* Result Box - More like a message bubble */
      #result {
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-top: 20px;
        font-size: 14px;
        line-height: 1.6;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        position: relative;
      }

      #result::before {
        content: "PREVIEW";
        font-size: 9px;
        font-weight: 800;
        color: #cbd5e1;
        position: absolute;
        top: 8px;
        right: 12px;
      }

      /* Footer / Guide Section */
      .footer {
        background: #f8fafc;
        padding: 24px;
        border-top: 1px solid var(--border);
        font-size: 12px;
      }

      .guide-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }

      .guide-card strong {
        display: block;
        margin-bottom: 10px;
        color: var(--text-main);
      }

      .guide-card ol {
        padding-left: 20px;
        margin: 0;
        color: var(--text-sub);
      }

      .guide-card li {
        margin-bottom: 8px;
      }

      .api-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        border-bottom: 1px solid transparent;
      }

      .api-link:hover {
        border-bottom-color: var(--primary);
      }

      .security-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #ecfdf5;
        color: #065f46;
        padding: 6px 12px;
        border-radius: 20px;
        margin-top: 16px;
        font-size: 11px;
        font-weight: 500;
      }

      /*Custom  Scrollbar*/
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
        transition: background 0.3s ease;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      textarea::-webkit-scrollbar {
        width: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo-wrapper">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#0a66c2">
            <path
              d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"
            />
          </svg>
        </div>
        <h2>LinkReach AI</h2>
        <p>Turn profiles into meaningful conversations</p>
      </div>

      <div class="input-group">
        <label for="apiKey">Gemini API Key</label>
        <input
          type="password"
          id="apiKey"
          placeholder="Enter your secret key"
        />
      </div>

      <div class="input-group">
        <label for="customPrompt">Your Instructions</label>
        <textarea
          id="customPrompt"
          placeholder="Write about your stack and goals..."
        >
I am a full-stack developer with 1.6+ years experience in Next.js, Node.js, React, MongoDB, Redis, Docker, AWS. Looking for freelance or job opportunities.</textarea
        >
      </div>

      <button id="generateBtn" class="btn-primary">Generate Message</button>

      <div
        id="status"
        style="
          text-align: center;
          font-size: 12px;
          margin-top: 10px;
          color: #64748b;
        "
      ></div>

      <div id="result"></div>

      <button
        id="copyBtn"
        class="btn-primary"
        style="
          display: none;
          background-color: var(--success);
          box-shadow: 0 4px 12px rgba(5, 118, 66, 0.25);
        "
      >
        Copy Message
      </button>
    </div>

    <div class="footer">
      <div class="guide-card">
        <strong>Quick Setup</strong>
        <ol>
          <li>
            Get your free key:
            <a
              href="https://aistudio.google.com/app/apikey"
              target="_blank"
              class="api-link"
              >AI Studio ↗</a
            >
          </li>
          <li>Paste key & context above.</li>
          <li>Visit a profile and click <strong>Generate</strong>.</li>
        </ol>
      </div>

      <div class="security-badge">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        End-to-End Encryption Local Storage
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
